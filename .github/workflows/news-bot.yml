name: AI News Radio Bot

on:
  schedule:
    - cron: '0 22,9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Start VOICEVOX Engine (Docker)
      run: |
        docker run -d -p 50021:50021 voicevox/voicevox_engine:cpu-ubuntu20.04-latest
        echo "VOICEVOXの起動を待機しています..."
        # VOICEVOXが応答するまで最大60秒間、5秒おきに状態を確認する安全装置
        timeout 60 bash -c 'until curl -s http://127.0.0.1:50021/version; do echo "まだ寝ています..."; sleep 5; done'
        echo "VOICEVOX 起動完了！"

    - name: Run AI News Bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WEBHOOK_TEXT: ${{ secrets.WEBHOOK_TEXT }}
        WEBHOOK_AUDIO: ${{ secrets.WEBHOOK_AUDIO }}
      run: python main.py
